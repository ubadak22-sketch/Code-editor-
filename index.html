<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>VOID — Universal Code Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/brace-fold.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/indent-fold.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.css">

<style>
/* ─── DESIGN TOKENS ─────────────────────────── */
:root {
  --gold-50:   #fffbeb;
  --gold-100:  #fef3c7;
  --gold-200:  #fde68a;
  --gold-300:  #fcd34d;
  --gold-400:  #fbbf24;
  --gold-500:  #f59e0b;
  --gold-600:  #d97706;
  --gold-700:  #b45309;
  --gold-800:  #92400e;
  --gold-900:  #78350f;

  --bg:        #fffdf5;
  --bg-panel:  #fffef8;
  --bg-toolbar:#fff8e1;
  --bg-hover:  #fef3c7;
  --bg-active: #fde68a;

  --border:        #fcd34d;
  --border-soft:   #fde68a;
  --border-strong: #f59e0b;

  --text:      #1c1208;
  --text-mid:  #6b4c10;
  --text-muted:#a07830;
  --text-faint:#c9a660;

  --accent:    #d97706;
  --accent-dk: #b45309;
  --accent-lt: #fbbf24;
  --accent-glow: rgba(217,119,6,0.18);

  --green:  #16a34a;
  --red:    #dc2626;
  --blue:   #2563eb;
  --orange: #ea580c;

  --radius:  7px;
  --toolbar-h: 54px;
  --status-h:  27px;
  --font-mono: 'JetBrains Mono', monospace;
  --font-ui:   'Playfair Display', Georgia, serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  overflow: hidden;
}

/* ─── LOADING ─────────────────────────────── */
#loading {
  position: fixed; inset: 0;
  background: var(--gold-50);
  display: flex; align-items: center;
  justify-content: center; flex-direction: column; gap: 18px;
  z-index: 9999;
  transition: opacity .45s ease;
}
#loading.done { opacity: 0; pointer-events: none; }
.load-brand {
  font-family: var(--font-ui);
  font-size: 48px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: -0.02em;
  text-shadow: 0 4px 24px var(--accent-glow);
}
.load-sub {
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.load-bar {
  width: 180px; height: 3px;
  background: var(--gold-200);
  border-radius: 99px; overflow: hidden;
}
.load-fill {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--gold-400), var(--gold-600));
  border-radius: 99px;
  animation: lf 1.4s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes lf { to { width: 100%; } }

/* ─── TOOLBAR ─────────────────────────────── */
#toolbar {
  height: var(--toolbar-h);
  background: var(--bg-toolbar);
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 6px;
  flex-shrink: 0;
  position: relative;
  z-index: 20;
  /* subtle grain */
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(251,191,36,.25) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 50%, rgba(217,119,6,.12) 0%, transparent 60%);
}

.brand {
  font-family: var(--font-ui);
  font-size: 22px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: -0.02em;
  user-select: none;
  margin-right: 10px;
  text-shadow: 0 2px 12px var(--accent-glow);
  white-space: nowrap;
}
.brand em {
  font-style: normal;
  font-size: 10px;
  font-family: var(--font-mono);
  font-weight: 400;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  vertical-align: middle;
  margin-left: 4px;
}

.sep { width: 1px; height: 24px; background: var(--border); margin: 0 6px; flex-shrink: 0; }

/* Language select */
.ls-wrap { position: relative; display: flex; align-items: center; }
.ls-icon { position: absolute; left: 9px; pointer-events: none; color: var(--text-muted); font-size: 13px; }
#lang-select {
  appearance: none; -webkit-appearance: none;
  background: var(--bg-panel);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 6px 26px 6px 28px;
  cursor: pointer;
  outline: none;
  min-width: 128px;
  transition: border-color .2s, box-shadow .2s;
}
#lang-select:hover, #lang-select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.ls-arr { position: absolute; right: 8px; pointer-events: none; color: var(--text-muted); font-size: 10px; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--font-mono); font-size: 12px; font-weight: 500;
  padding: 6px 12px;
  border-radius: var(--radius);
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: all .17s;
  white-space: nowrap;
  user-select: none;
  letter-spacing: 0.01em;
  flex-shrink: 0;
}
.btn svg { flex-shrink: 0; }

.btn-run {
  background: linear-gradient(135deg, var(--gold-500), var(--gold-600));
  color: #fff;
  border-color: var(--gold-600);
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(217,119,6,.25), inset 0 1px 0 rgba(255,255,255,.2);
}
.btn-run:hover {
  background: linear-gradient(135deg, var(--gold-400), var(--gold-500));
  box-shadow: 0 4px 18px rgba(217,119,6,.38);
  transform: translateY(-1px);
}
.btn-run:active { transform: none; box-shadow: 0 1px 4px rgba(217,119,6,.25); }
.btn-run.running { animation: pulse 1s infinite alternate; }
@keyframes pulse {
  from { box-shadow: 0 2px 8px rgba(217,119,6,.25); }
  to   { box-shadow: 0 4px 24px rgba(217,119,6,.55); }
}

.btn-ghost {
  background: var(--bg-panel);
  color: var(--text-mid);
  border-color: var(--border);
}
.btn-ghost:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
  color: var(--accent);
}

.btn-danger {
  background: var(--bg-panel);
  color: var(--red);
  border-color: var(--border);
}
.btn-danger:hover { background: #fff1f1; border-color: var(--red); }

/* Toolbar right */
.tb-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.cursor-info {
  font-size: 11px; color: var(--text-muted);
  padding: 4px 8px;
  background: var(--bg-panel);
  border: 1.5px solid var(--border-soft);
  border-radius: var(--radius);
  white-space: nowrap;
}

/* Mobile hamburger */
#mob-menu-btn {
  display: none;
  background: var(--bg-hover);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 8px;
  cursor: pointer;
  color: var(--accent);
}
#mob-actions {
  display: none;
  position: absolute;
  top: calc(var(--toolbar-h) + 2px);
  right: 10px;
  background: var(--bg-toolbar);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  gap: 6px;
  flex-direction: column;
  z-index: 100;
  min-width: 160px;
  box-shadow: 0 8px 32px rgba(180,100,20,.15);
}
#mob-actions.open { display: flex; }
#mob-actions .btn { width: 100%; justify-content: flex-start; }

/* ─── LAYOUT ──────────────────────────────── */
#layout {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

#main {
  display: flex;
  flex: 1;
  overflow: hidden;
  height: calc(100vh - var(--toolbar-h) - var(--status-h));
}

/* ─── PANELS ──────────────────────────────── */
.panel { display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

#editor-panel { flex: 1 1 55%; }
#output-panel { flex: 1 1 45%; }

.panel-header {
  height: 36px;
  background: var(--bg-toolbar);
  border-bottom: 1.5px solid var(--border-soft);
  display: flex; align-items: center;
  padding: 0 12px; gap: 8px;
  flex-shrink: 0;
}
.panel-tab {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-family: var(--font-mono);
  color: var(--text-mid);
  background: var(--bg-active);
  border: 1.5px solid var(--border);
  border-radius: 5px;
  padding: 3px 10px;
}
.tab-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
.panel-label {
  margin-left: auto;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-faint);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ─── CODEMIRROR LIGHT GOLD THEME ─────────── */
#editor-wrap { flex: 1; overflow: hidden; position: relative; }

.CodeMirror {
  height: 100% !important;
  font-family: var(--font-mono) !important;
  font-size: 13px !important;
  line-height: 1.75 !important;
  background: #fffef5 !important;
  color: #2d1a00 !important;
}
.CodeMirror-scroll { padding-bottom: 80px; }
.CodeMirror-gutters {
  background: #fff8dc !important;
  border-right: 2px solid #fde68a !important;
  min-width: 48px;
}
.CodeMirror-linenumber {
  color: #d4a840 !important;
  font-size: 11px !important;
  padding: 0 10px 0 6px !important;
}
.CodeMirror-activeline-background { background: rgba(251,191,36,.09) !important; }
.CodeMirror-activeline .CodeMirror-linenumber { color: var(--accent) !important; font-weight: 600 !important; }
.CodeMirror-cursor { border-left: 2px solid var(--accent-dk) !important; }
.CodeMirror-selected { background: rgba(251,191,36,.28) !important; }
.CodeMirror-matchingbracket { color: var(--accent-dk) !important; outline: 1px solid var(--accent); border-radius: 2px; }

/* Syntax token colors — warm gold palette */
.cm-keyword    { color: #b45309 !important; font-weight: 600; }
.cm-atom       { color: #d97706 !important; }
.cm-number     { color: #b45309 !important; }
.cm-def        { color: #1e40af !important; }
.cm-variable   { color: #1c1208 !important; }
.cm-variable-2 { color: #9a3412 !important; }
.cm-variable-3 { color: #15803d !important; }
.cm-property   { color: #7c3aed !important; }
.cm-operator   { color: #d97706 !important; font-weight: 700; }
.cm-comment    { color: #a07830 !important; font-style: italic; }
.cm-string     { color: #15803d !important; }
.cm-string-2   { color: #166534 !important; }
.cm-meta       { color: #6b4c10 !important; }
.cm-qualifier  { color: #9a3412 !important; }
.cm-builtin    { color: #0369a1 !important; font-weight: 600; }
.cm-bracket    { color: #b45309 !important; }
.cm-tag        { color: #b45309 !important; font-weight: 600; }
.cm-attribute  { color: #0369a1 !important; }
.cm-hr         { color: #a07830 !important; }
.cm-link       { color: #1d4ed8 !important; text-decoration: underline; }

.CodeMirror-foldgutter-open, .CodeMirror-foldgutter-folded { color: #d4a840 !important; }
.CodeMirror-scrollbar-filler, .CodeMirror-gutter-filler { background: #fff8dc !important; }

/* ─── RESIZER ─────────────────────────────── */
#resizer {
  width: 5px; flex-shrink: 0;
  background: var(--border);
  cursor: col-resize;
  position: relative;
  transition: background .2s;
  z-index: 5;
}
#resizer::after { content: ''; position: absolute; inset: 0 -4px; }
#resizer:hover, #resizer.dragging {
  background: var(--accent);
}

/* ─── OUTPUT AREA ─────────────────────────── */
#preview-frame {
  flex: 1; width: 100%; border: none;
  background: #fff;
  display: none;
}
#preview-frame.visible { display: block; }

#console-area {
  flex: 1; overflow-y: auto;
  padding: 14px 16px;
  background: #fffdf0;
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.8;
  display: none;
  border-left: 2px solid var(--border-soft);
}
#console-area.visible { display: block; }

.console-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 12px;
  color: var(--text-faint);
  font-size: 12px; user-select: none;
  text-align: center; padding: 20px;
}
.console-empty svg { opacity: .4; }
.kbd {
  display: inline-flex; align-items: center;
  background: var(--bg-active);
  border: 1.5px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 10px; color: var(--text-mid);
  font-family: var(--font-mono);
}

.console-line { display: flex; gap: 10px; align-items: flex-start; }
.console-prompt { font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.con-log   .console-prompt { color: var(--accent); }
.con-warn  .console-prompt { color: var(--orange); }
.con-error .console-prompt { color: var(--red); }
.con-info  .console-prompt { color: var(--blue); }
.con-error .console-text   { color: var(--red); }
.con-warn  .console-text   { color: #92400e; }
.console-text { color: var(--text); word-break: break-all; }
.console-meta { color: var(--text-muted); font-size: 11px; margin: 6px 0 2px; font-style: italic; }
.console-code { color: #6b4c10; white-space: pre; font-size: 12px; }
.console-spinner { color: var(--accent) !important; animation: blink 1s step-start infinite; }
@keyframes blink { 50% { opacity: .4; } }

/* ─── STATUS BAR ──────────────────────────── */
#statusbar {
  height: var(--status-h);
  background: linear-gradient(90deg, var(--gold-500), var(--gold-600));
  display: flex; align-items: center;
  padding: 0 14px; gap: 14px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: #fff;
  flex-shrink: 0;
}
.sb-item { display: flex; align-items: center; gap: 5px; opacity: .9; }
.sb-dot  { width: 6px; height: 6px; border-radius: 50%; background: #fff; opacity: .7; }
.sb-right { margin-left: auto; display: flex; gap: 14px; }
.sb-right span { opacity: .75; }

/* ─── NOTIFICATION ────────────────────────── */
#notif {
  position: fixed; bottom: 44px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--bg-toolbar);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 16px;
  font-size: 12px; font-family: var(--font-mono);
  color: var(--text-mid);
  pointer-events: none; opacity: 0;
  transition: all .22s;
  z-index: 999; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(180,100,20,.12);
}
#notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#notif.ok  { border-color: var(--green); color: var(--green); }
#notif.err { border-color: var(--red);   color: var(--red); }

/* ─── MOBILE TAB SWITCHER ─────────────────── */
#mob-tabs {
  display: none;
  height: 40px;
  background: var(--bg-toolbar);
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
}
.mob-tab {
  flex: 1; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-family: var(--font-mono);
  color: var(--text-muted); cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all .18s;
}
.mob-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg-hover); }

/* ─── SCROLLBAR ───────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--gold-50); }
::-webkit-scrollbar-thumb { background: var(--gold-300); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-400); }

/* ─── ANIMATIONS ──────────────────────────── */
@keyframes fadein { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform:none; } }
#toolbar, #main, #statusbar { animation: fadein .3s ease both; }
#main { animation-delay: .06s; }
#statusbar { animation-delay: .12s; }

/* ─── RESPONSIVE ──────────────────────────── */

/* Tablet (≤ 900px) — stack toolbar items tighter */
@media (max-width: 900px) {
  .btn-ghost:not(#btn-run) .btn-text { display: none; }
  .btn-ghost:not(#btn-run) { padding: 6px 9px; }
  .btn-danger .btn-text { display: none; }
  .btn-danger { padding: 6px 9px; }
}

/* Mobile (≤ 640px) — single column, tabs to switch panels */
@media (max-width: 640px) {
  :root { --toolbar-h: 52px; }

  #toolbar { padding: 0 10px; gap: 6px; }
  .brand { font-size: 18px; margin-right: 6px; }
  .brand em { display: none; }

  /* Show mobile menu button, hide desktop buttons */
  #mob-menu-btn { display: flex; align-items: center; }
  #btn-copy, #btn-format, #btn-clear-editor, #btn-clear-output,
  .sep, .cursor-info { display: none !important; }
  .tb-right { display: none; }

  /* Stacked layout */
  #main { flex-direction: column; }
  #resizer { display: none; }

  /* Both panels fill full width; visibility toggled via JS */
  #editor-panel, #output-panel {
    flex: none;
    width: 100% !important;
    height: 100%;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
  }
  #output-panel { display: none; }
  #output-panel.mob-visible { display: flex; }
  #editor-panel.mob-hidden  { display: none; }

  /* Show tab bar */
  #mob-tabs { display: flex; }

  /* Bigger touch targets */
  .btn { padding: 7px 11px; }
  .btn-run { padding: 7px 14px; }

  #lang-select { min-width: 108px; font-size: 11px; }

  #main {
    height: calc(100vh - var(--toolbar-h) - var(--status-h) - 40px);
    position: relative;
  }

  .CodeMirror { font-size: 12px !important; }
  #console-area { font-size: 12px; }
}

/* Very small (≤ 380px) */
@media (max-width: 380px) {
  .brand { font-size: 16px; }
  #lang-select { min-width: 90px; font-size: 10px; }
  .btn { font-size: 11px; padding: 6px 9px; }
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="load-brand">VOID</div>
  <div class="load-sub">Universal Code Editor</div>
  <div class="load-bar"><div class="load-fill"></div></div>
</div>

<div id="layout">

  <!-- ── TOOLBAR ── -->
  <div id="toolbar">
    <div class="brand">VOID <em>IDE</em></div>

    <!-- Language selector -->
    <div class="ls-wrap">
      <span class="ls-icon">⌥</span>
      <select id="lang-select">
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="javascript" selected>JavaScript</option>
        <option value="python">Python</option>
        <option value="cpp">C++</option>
        <option value="java">Java</option>
        <option value="text">Plain Text</option>
      </select>
      <span class="ls-arr">▾</span>
    </div>

    <div class="sep"></div>

    <!-- Run -->
    <button class="btn btn-run" id="btn-run">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="currentColor">
        <path d="M1.5 1L9.5 5.5L1.5 10V1Z"/>
      </svg>
      <span class="btn-text">Run</span>
    </button>

    <div class="sep"></div>

    <!-- Desktop action buttons -->

from functools import lru_cache
import random

@lru_cache(maxsize=None)
def fib(n):
    return n if n < 2 else fib(n-1) + fib(n-2)

def quicksort(arr):
    if len(arr) <= 1:
        return arr
    pivot = arr[len(arr) // 2]
    left   = [x for x in arr if x < pivot]
    middle = [x for x in arr if x == pivot]
    right  = [x for x in arr if x > pivot]
    return quicksort(left) + middle + quicksort(right)

# Demo
nums = [random.randint(1, 99) for _ in range(10)]
print(f"Original:  {nums}")
print(f"Sorted:    {quicksort(nums)}")

#include <iostream>
#include <vector>
#include <memory>

template<typename T>
class LinkedList {
    struct Node {
        T data;
        std::unique_ptr<Node> next;
        explicit Node(T d) : data(std::move(d)) {}
    };
    std::unique_ptr<Node> head;
    int sz = 0;
public:
    void push(T val) {
        auto n = std::make_unique<Node>(std::move(val));
        n->next = std::move(head);
        head = std::move(n);
        ++sz;
    }
    void print() const {
        for (Node* n = head.get(); n; n = n->next.get())
            std::cout << n->data << (n->next ? " -> " : "\\n");
    }
    int size() const { return sz; }
};

int main() {
    LinkedList<int> list;
    for (int x : {5, 3, 8, 1, 9, 2, 7})
        list.push(x);
    std::cout << "List (" << list.size() << " items): ";
    list.print();

}`,

public class Main {
    record Point(double x, double y) {
        double distanceTo(Point other) {
            double dx = this.x - other.x;
            double dy = this.y - other.y;
            return Math.sqrt(dx * dx + dy * dy);
        }
        @Override public String toString() {

        }

            new Point(0, 0), new Point(3, 4),

        );

                p, new Point(0,0).distanceTo(p))
        );

        var farthest = points.stream()

text:`VOID IDE — Universal Code Editor
══════════════════════════════════

A fully browser-based code editor.
No installation. No server. Just open and code.

SUPPORTED LANGUAGES
  HTML / CSS / JavaScript  →  Live preview in-browser
  Python / C++ / Java      →  Syntax highlighted display

KEYBOARD SHORTCUTS
  Ctrl + Enter   Run code
  Ctrl + /       Toggle comment
  Tab            Indent (2 spaces)

FEATURES
  • Syntax highlighting (CodeMirror)
  • Resizable split panels
  • Line numbers + code folding
  • Mobile responsive — works on phone & tablet
  • One-click copy
  • Beautiful gold theme`
};

/* ── LANG META ───────────────────────────── */
const LANGS = {
  javascript: { cm:'javascript',      name:'JavaScript', file:'main.js',    web:false },
  html:       { cm:'htmlmixed',       name:'HTML',       file:'index.html', web:true  },
  css:        { cm:'css',             name:'CSS',        file:'style.css',  web:true  },
  python:     { cm:'python',          name:'Python',     file:'main.py',    web:false },
  cpp:        { cm:'text/x-c++src',   name:'C++',        file:'main.cpp',   web:false },
  java:       { cm:'text/x-java',     name:'Java',       file:'Main.java',  web:false },
  text:       { cm:null,             name:'Plain Text', file:'notes.txt',  web:false },
};

/* ── INIT EDITOR ─────────────────────────── */
const editor = CodeMirror.fromTextArea(document.getElementById('code-input'), {
  mode: 'javascript',
  theme: 'default',
  lineNumbers: true,
  lineWrapping: false,
  autoCloseBrackets: true,
  matchBrackets: true,
  styleActiveLine: true,
  indentUnit: 2,
  tabSize: 2,
  indentWithTabs: false,
  foldGutter: true,
  gutters: ['CodeMirror-linenumbers','CodeMirror-foldgutter'],
  extraKeys: {
    'Ctrl-Enter': runCode,
    'Cmd-Enter':  runCode,
    'Ctrl-/':  cm => cm.execCommand('toggleComment'),
    'Cmd-/':   cm => cm.execCommand('toggleComment'),
    'Tab': cm => {
      if (cm.somethingSelected()) cm.indentSelection('add');
      else cm.replaceSelection('  ', 'end');
    }
  }
});
editor.setValue(SNIPPETS.javascript);

/* cursor info */
editor.on('cursorActivity', () => {
  const c = editor.getCursor();
  document.getElementById('cursor-info').textContent = `Ln ${c.line+1}, Col ${c.ch+1}`;
});
editor.on('change', () => {
  const n = editor.lineCount();
  document.getElementById('sb-lines').textContent = `${n} line${n!==1?'s':''}`;
});

/* ── LANGUAGE SWITCH ─────────────────────── */
const langSel = document.getElementById('lang-select');
langSel.addEventListener('change', () => switchLang(langSel.value));

function switchLang(lang) {
  const m = LANGS[lang];
  editor.setOption('mode', m.cm || null);
  editor.setValue(SNIPPETS[lang] || '');
  document.getElementById('file-label').textContent = m.file;
  document.getElementById('sb-lang').textContent = m.name;
  clearOutput();
  setMode(m.web ? 'preview' : 'console');
}

/* ── OUTPUT MODE ─────────────────────────── */
const previewEl = document.getElementById('preview-frame');
const consoleEl = document.getElementById('console-area');

function setMode(mode) {
  if (mode === 'preview') {
    previewEl.classList.add('visible');
    consoleEl.classList.remove('visible');
    document.getElementById('out-dot').style.background = 'var(--blue)';
    document.getElementById('out-label').textContent = 'Preview';
  } else {
    previewEl.classList.remove('visible');
    consoleEl.classList.add('visible');
    document.getElementById('out-dot').style.background = 'var(--accent)';
    document.getElementById('out-label').textContent = 'Console';
  }
}
setMode('console');

/* ── RUN ─────────────────────────────────── */
function runCode() {
  const lang = langSel.value;
  const code = editor.getValue();
  const meta = LANGS[lang];
  const btn  = document.getElementById('btn-run');

  btn.classList.add('running');
  setTimeout(() => btn.classList.remove('running'), 700);

  // On mobile, auto-switch to output tab
  if (window.innerWidth <= 640) switchMobTab('output');

  if (lang === 'html' || lang === 'css') {
    renderWebPreview(lang, code);
  } else if (lang === 'javascript') {
    runJS(code);
  } else {
    runViaPiston(lang, code, meta);
  }
}

function renderWebPreview(lang, code) {
  setMode('preview');
  let html = code;
  if (lang === 'css') {
    html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
      *{box-sizing:border-box;margin:0;padding:0}
      ${code}
    </style></head><body><div class="box"></div></body></html>`;
  }
  const blob = new Blob([html], { type:'text/html' });
  previewEl.src = URL.createObjectURL(blob);
  notify('Preview updated ✓', 'ok');
}

function runJS(code) {
  setMode('console');
  clearOutput();
  const logs = [];
  const orig = { log:console.log, warn:console.warn, error:console.error, info:console.info };
  const cap = type => (...args) => logs.push({ type, text: args.map(s).join(' ') });
  console.log=cap('log'); console.warn=cap('warn');
  console.error=cap('error'); console.info=cap('info');
  const t0 = performance.now();
  try {
    (new Function(code))();
    const ms = (performance.now()-t0).toFixed(1);
    addLine('meta', `✓ Done in ${ms}ms`);
    logs.forEach(l => addLine(l.type, l.text));
    if (!logs.length) addLine('meta','(no console output)');
    notify('Ran successfully ✓', 'ok');
  } catch(e) {
    logs.forEach(l => addLine(l.type, l.text));
    addLine('error', e.toString());
    notify('Runtime error', 'err');
  } finally {
    Object.assign(console, orig);
  }
}

/* ── PISTON API EXECUTION ────────────────── */
// Maps our lang keys → Piston language + version
const PISTON_LANGS = {
  python: { language: 'python',  version: '3.10.0' },
  cpp:    { language: 'c++',     version: '10.2.0' },
  java:   { language: 'java',    version: '15.0.2' },
};

async function runViaPiston(lang, code, meta) {
  setMode('console');
  clearOutput();

  const pistonCfg = PISTON_LANGS[lang];
  if (!pistonCfg) {
    addLine('meta', `ℹ ${meta.name} is not supported for execution.`);
    return;
  }

  // Show a "running" spinner line
  const spinnerDiv = document.createElement('div');
  spinnerDiv.className = 'console-meta console-spinner';
  spinnerDiv.textContent = `⏳ Running ${meta.name} via Piston…`;
  document.getElementById('console-empty')?.remove();
  consoleEl.appendChild(spinnerDiv);

  notify(`Running ${meta.name}…`, '');

  try {
    const res = await fetch('https://emkc.org/api/v2/piston/execute', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        language: pistonCfg.language,
        version:  pistonCfg.version,
        files: [{ name: meta.file, content: code }],
        stdin: '',
        args: [],
        compile_timeout: 10000,
        run_timeout: 5000,
      })
    });

    if (!res.ok) throw new Error(`Piston API error: ${res.status} ${res.statusText}`);
    const data = await res.json();
    spinnerDiv.remove();

    const compile = data.compile;
    const run     = data.run;

    // Compile output (C++/Java have this stage)
    if (compile) {
      if (compile.stderr) {
        addLine('meta', '── Compile Errors ──────────────────────');
        compile.stderr.split('\n').filter(Boolean).forEach(l => addLine('error', l));
      }
      if (compile.stdout) {
        compile.stdout.split('\n').filter(Boolean).forEach(l => addLine('log', l));
      }
    }

    // Run output
    if (run) {
      const hasOutput = run.stdout || run.stderr;
      if (run.stdout) {
        addLine('meta', '── Output ───────────────────────────────');
        run.stdout.split('\n').forEach(l => addLine('log', l));
      }
      if (run.stderr) {
        addLine('meta', '── Stderr ───────────────────────────────');
        run.stderr.split('\n').filter(Boolean).forEach(l => addLine('error', l));
      }
      if (!hasOutput) {
        addLine('meta', '(program exited with no output)');
      }
      const exitCode = run.code ?? '?';
      addLine('meta', `─────────────────────────────────────────`);
      addLine('meta', `Exit code: ${exitCode}  ·  ${meta.name} via Piston API`);

      if (run.code === 0) {
        notify('Executed successfully ✓', 'ok');
      } else {
        notify(`Exited with code ${run.code}`, 'err');
      }
    }

  } catch (err) {
    spinnerDiv.remove();
    addLine('error', `Failed to reach Piston API: ${err.message}`);
    addLine('meta', 'Check your internet connection or try again.');
    notify('Execution failed', 'err');
  }
}

/* ── CONSOLE HELPERS ─────────────────────── */
function addLine(type, text) {
  document.getElementById('console-empty')?.remove();
  const map = {
    log:  { cls:'con-log',   p:'›' },
    warn: { cls:'con-warn',  p:'⚠' },
    error:{ cls:'con-error', p:'✕' },
    info: { cls:'con-info',  p:'i' },
    meta: { cls:'',          p:''  },
    code: { cls:'',          p:''  },
  };
  const cfg = map[type]||map.log;
  const div = document.createElement('div');
  if (type==='meta') {
    div.className='console-meta'; div.textContent=text;
  } else if (type==='code') {
    div.className='console-line';
    const t=document.createElement('span');
    t.className='console-code'; t.textContent=text;
    div.appendChild(t);
  } else {
    div.className='console-line '+cfg.cls;
    const p=document.createElement('span'); p.className='console-prompt'; p.textContent=cfg.p;
    const t=document.createElement('span'); t.className='console-text'; t.textContent=text;
    div.appendChild(p); div.appendChild(t);
  }
  consoleEl.appendChild(div);
  consoleEl.scrollTop=consoleEl.scrollHeight;
}

function clearOutput() {
  consoleEl.innerHTML=`<div class="console-empty" id="console-empty">
    <svg width="38" height="38" viewBox="0 0 40 40" fill="none">
      <rect x="4" y="8" width="32" height="24" rx="3" stroke="#d4a840" stroke-width="2"/>
      <path d="M12 16l5 4-5 4M21 24h7" stroke="#d4a840" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Press <span class="kbd">Ctrl+Enter</span> or tap <strong>Run</strong>
  </div>`;
  previewEl.src='about:blank';
}

function s(v) {
  if(v===null) return 'null';
  if(v===undefined) return 'undefined';
  if(typeof v==='object') { try{return JSON.stringify(v,null,2);}catch{return String(v);} }
  return String(v);
}

/* ── BUTTONS ─────────────────────────────── */
document.getElementById('btn-run').onclick = runCode;
document.getElementById('btn-clear-output').onclick = () => { clearOutput(); notify('Output cleared',''); };
document.getElementById('btn-clear-editor').onclick = () => { editor.setValue(''); editor.focus(); notify('Editor cleared',''); };

// Mobile action buttons

function copyCode() {

    .then(()=>notify('Copied! ✓','ok'))
    .catch(()=>{ /* fallback */ });
  closeMobMenu();
}

/* ── MOBILE MENU ─────────────────────────── */
let mobMenuOpen=false;
function toggleMobMenu() {
  mobMenuOpen=!mobMenuOpen;
  document.getElementById('mob-actions').classList.toggle('open',mobMenuOpen);

/* ── MOBILE TABS ─────────────────────────── */
let mobTab='editor';
function switchMobTab(tab) {
  mobTab=tab;
  const edP=document.getElementById('editor-panel');
  const outP=document.getElementById('output-panel');
  document.getElementById('tab-editor').classList.toggle('active',tab==='editor');

  if(tab==='editor') {
    edP.classList.remove('mob-hidden');
    outP.classList.remove('mob-visible');
  } else {
    edP.classList.add('mob-hidden');
    outP.classList.add('mob-visible');
  }
  if(tab==='editor') setTimeout(()=>editor.refresh(),50);
}

/* ── RESIZER ─────────────────────────────── */
const resizer=document.getElementById('resizer');
const edPanel=document.getElementById('editor-panel');
const outPanel=document.getElementById('output-panel');
let resizing=false;

resizer.addEventListener('mousedown',()=>{
  resizing=true; resizer.classList.add('dragging');
  document.body.style.cssText='cursor:col-resize;user-select:none';
});
document.addEventListener('mousemove',e=>{
  if(!resizing) return;
  const main=document.getElementById('main');
  const r=main.getBoundingClientRect();
  let w=e.clientX-r.left;
  w=Math.max(180,Math.min(r.width-5-180,w));
  edPanel.style.flex='none'; edPanel.style.width=w+'px';
  outPanel.style.flex='1';
});
document.addEventListener('mouseup',()=>{
  if(resizing){ resizing=false; resizer.classList.remove('dragging');
    document.body.style.cssText=''; editor.refresh(); }
});

/* ── NOTIFY ──────────────────────────────── */
let ntTimer;
function notify(msg,type='') {
  const el=document.getElementById('notif');
  el.textContent=msg; el.className='show'+(type?' '+type:'');
  clearTimeout(ntTimer);
  ntTimer=setTimeout(()=>el.className='',2000);
}

/* ── CLOCK ───────────────────────────────── */
function tick(){
  document.getElementById('sb-clock').textContent=
    new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
tick(); setInterval(tick,15000);

/* ── LOADING SCREEN ──────────────────────── */
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('loading').classList.add('done');
    editor.refresh(); editor.focus();
  },1400);
});
</script>
